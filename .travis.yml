language: php

php:
  - 7.4
  - 8.0
  - 8.1
  - 8.2

sudo: false

script:
  - vendor/bin/phpcs --standard=psr2 --extensions=php --warning-severity=0 --report=full "src"
  - vendor/bin/phpunit --coverage-text

before_script:
  - composer self-update
  - composer install --prefer-source --no-interaction
